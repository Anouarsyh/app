# Configuration pour SonarQube
sonar.projectKey=edr-automation
sonar.projectName=EDR Automation
sonar.projectVersion=1.0

# Sources
sonar.sources=.
sonar.exclusions=venv/**,**/*.pyc,**/__pycache__/**

# Python spécifique
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=pytest-report.xml

# Configuration d'encodage
sonar.sourceEncoding=UTF-8
